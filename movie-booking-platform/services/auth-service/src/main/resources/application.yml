server:
  port: 8086

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://${AUTH_DB_HOST:localhost}:5432/auth_db
    username: "moviebooking"
    password: "moviebooking123"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 64
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 900000  # Default TTL: 15 minutes

jwt:
  key-store-path: ${JWT_KEY_STORE_PATH:classpath:keystore/auth-keystore.p12}
  key-store-password: ${JWT_KEY_STORE_PASSWORD:changeit}
  key-alias: ${JWT_KEY_ALIAS:auth-key}
  access-token-expiry: 900000
  refresh-token-expiry: 604800000

logging:
  level:
    com.xyz.auth: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
  pattern:
    console: "%d{HH:mm:ss} %-5level [%logger{20}] - %msg%n"
