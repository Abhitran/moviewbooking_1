server:
  port: 8082

spring:
  application:
    name: theatre-service

  datasource:
    url: jdbc:postgresql://${THEATRE_DB_HOST:localhost}:5432/theatre_db
    username: "moviebooking"
    password: "moviebooking123"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 64
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000  # 60 seconds default TTL

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8086}

logging:
  level:
    com.xyz.theatre: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
