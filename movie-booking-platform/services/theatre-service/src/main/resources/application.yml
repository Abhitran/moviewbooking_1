server:
  port: 8082

spring:
  application:
    name: theatre-service

  datasource:
    url: jdbc:postgresql://${THEATRE_DB_HOST:localhost}:5432/theatre_db
    username: "moviebooking"
    password: "moviebooking123"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8086}

logging:
  level:
    com.xyz.theatre: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss} %-5level [%logger{20}] - %msg%n"
