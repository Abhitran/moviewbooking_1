server:
  port: 8083

spring:
  application:
    name: booking-service

  datasource:
    url: jdbc:postgresql://${BOOKING_DB_HOST:localhost}:5432/booking_db
    username: "moviebooking"
    password: "moviebooking123"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 64
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000  # Default TTL: 60 seconds

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        compression.type: snappy
        linger.ms: 10
        batch.size: 32768
        spring.json.add.type.headers: false
    consumer:
      group-id: booking-service
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.xyz.common.events"
        session.timeout.ms: 30000
        heartbeat.interval.ms: 10000
    listener:
      ack-mode: manual
      concurrency: 3

theatre:
  service:
    url: ${THEATRE_SERVICE_URL:http://localhost:8082}

payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8084}

booking:
  seat-hold:
    ttl-seconds: 600
    max-seats: 10

logging:
  level:
    com.xyz.booking: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{HH:mm:ss} %-5level [%logger{20}] - %msg%n"
